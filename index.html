<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iSketch</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #ffffff; margin: 0; padding: 10px; }
        #canvas-container { width: 100%; max-width: 360px; margin: 10px auto; background: white; }
        svg { width: 100%; height: auto; }
        .palette { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; max-width: 280px; margin: 20px auto; }
        .color-btn { height: 45px; border-radius: 12px; cursor: pointer; border: 1px solid rgba(0,0,0,0.15); box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: transform 0.1s; }
        .color-btn:active { transform: scale(0.95); }
        .colorable { fill: #ffffff; stroke: #222222; stroke-width: 3.5; stroke-linecap: round; stroke-linejoin: round; cursor: pointer; transition: fill 0.2s ease; }
        .skin { fill: #ffe0bd; stroke: #222222; stroke-width: 3.5; stroke-linecap: round; stroke-linejoin: round; }
    </style>
</head>
<body>

    <div id="canvas-container">
        <svg viewBox="0 0 200 320">
            <path id="cap" class="colorable" d="M 76,45 C 68,30 80,18 95,28 C 105,15 125,20 124,38 C 138,28 142,45 128,52 C 110,50 90,52 76,45 Z" />

            <path id="face" class="skin" d="M 76,52 C 68,75 132,75 124,52 C 110,56 90,56 76,52 Z" />
            <path d="M 91,58 Q 93,56 94,59" fill="none" stroke="#222222" stroke-width="2.5" stroke-linecap="round" />
            <path d="M 106,58 Q 108,56 109,59" fill="none" stroke="#222222" stroke-width="2.5" stroke-linecap="round" />
            <path d="M 89,68 C 94,76 106,76 111,68" fill="none" stroke="#222222" stroke-width="2.5" stroke-linecap="round" />

            <path id="tie" class="colorable" d="M 96,82 Q 100,80 104,82 L 106,98 L 100,108 L 94,98 Z" />

            <path id="shirt" class="colorable" d="M 88,84 
                     C 70,82 52,70 42,54 C 47,48 55,56 68,68 
                     C 80,80 84,100 84,135 L 116,135 
                     C 116,100 120,80 132,68 C 145,56 153,48 158,54 
                     C 148,70 130,82 112,84 Z" />

            <path id="left-glove" class="colorable" d="M 42,54 C 34,46 44,38 48,46 Z" />
            <path id="right-glove" class="colorable" d="M 158,54 C 166,46 156,38 152,46 Z" />

            <path id="pants" class="colorable" d="M 84,135 L 116,135 C 118,175 124,220 124,255 L 105,255 C 103,210 100,180 95,255 L 76,255 C 76,220 82,175 84,135 Z" />

            <path id="left-shoe" class="colorable" d="M 76,255 C 60,253 54,268 76,268 L 105,268 C 105,255 105,255 105,255 Z" />
            <path id="right-shoe" class="colorable" d="M 124,255 C 140,253 146,268 124,268 L 95,268 C 95,255 95,255 95,255 Z" />
        </svg>
    </div>

    <div class="palette">
        <div class="color-btn" style="background: #8B00FF;" onclick="selectColor('V')"></div>
        <div class="color-btn" style="background: #0000FF;" onclick="selectColor('B')"></div>
        <div class="color-btn" style="background: #00FF00;" onclick="selectColor('G')"></div>
        <div class="color-btn" style="background: #FFFF00;" onclick="selectColor('Y')"></div>
        <div class="color-btn" style="background: #FFA500;" onclick="selectColor('O')"></div>
        <div class="color-btn" style="background: #FF0000;" onclick="selectColor('R')"></div>
    </div>

<script>
    const firebaseConfig = {
        databaseURL: "https://magic-color-match-default-rtdb.asia-southeast1.firebasedatabase.app/"
    };
    
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let currentColor = "";

    function selectColor(colorCode) {
        currentColor = colorCode;
        database.ref('secret/last_tap').set({
            color: colorCode,
            timestamp: Date.now()
        });
    }

    const colorMap = { 'V': '#8B00FF', 'B': '#0000FF', 'G': '#00FF00', 'Y': '#FFFF00', 'O': '#FFA500', 'R': '#FF0000' };
    
    document.querySelectorAll('.colorable').forEach(element => {
        element.addEventListener('click', function() {
            if (currentColor !== "") {
                const targetColor = colorMap[currentColor];
                const elementId = this.id;

                if (elementId === 'left-glove' || elementId === 'right-glove') {
                    document.getElementById('left-glove').style.fill = targetColor;
                    document.getElementById('right-glove').style.fill = targetColor;
                } 
                else if (elementId === 'left-shoe' || elementId === 'right-shoe') {
                    document.getElementById('left-shoe').style.fill = targetColor;
                    document.getElementById('right-shoe').style.fill = targetColor;
                } 
                else {
                    this.style.fill = targetColor;
                }
            }
        });
    });
</script>
</body>
</html>
