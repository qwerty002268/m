<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coloring Page</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #ffffff; margin: 0; padding: 10px; }
        #canvas-container { width: 100%; max-width: 360px; margin: 10px auto; background: white; }
        svg { width: 100%; height: auto; }
        .palette { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; max-width: 280px; margin: 20px auto; }
        .color-btn { height: 45px; border-radius: 12px; cursor: pointer; border: 1px solid rgba(0,0,0,0.15); box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: transform 0.1s; }
        .color-btn:active { transform: scale(0.95); }
        .colorable { fill: #ffffff; stroke: #1a1a1a; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; cursor: pointer; transition: fill 0.2s ease; }
        .skin { fill: #ffe0bd; stroke: #1a1a1a; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
    </style>
</head>
<body>

    <div id="canvas-container">
        <svg viewBox="0 0 200 320">
            <g id="character">
                <path id="shirt" class="colorable" d="M 75,105 L 125,105 L 120,165 L 80,165 Z M 75,105 L 45,85 L 53,75 L 75,98 Z M 125,105 L 155,85 L 147,75 L 125,98 Z" />

                <path id="tie" class="colorable" d="M 96,105 L 104,105 L 106,122 L 100,132 L 94,122 Z" />

                <path id="pants" class="colorable" d="M 80,165 L 120,165 L 125,255 L 105,255 L 100,195 L 95,255 L 75,255 Z" />

                <path id="face" class="skin" d="M 80,60 C 80,45 120,45 120,60 C 120,82 80,82 80,60 Z" />
                <circle cx="93" cy="58" r="2" fill="#1a1a1a" />
                <circle cx="107" cy="58" r="2" fill="#1a1a1a" />
                <path d="M 94,68 C 97,72 103,72 106,68" fill="none" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round" />

                <path id="cap" class="colorable" d="M 68,48 C 75,48 72,20 100,20 C 128,20 125,48 132,48 C 140,48 140,54 132,54 C 110,54 90,54 68,54 C 60,54 60,48 68,48 Z" />

                <path id="left-glove" class="colorable" d="M 45,85 C 38,80 43,68 53,75 Z" />
                <path id="right-glove" class="colorable" d="M 155,85 C 162,80 157,68 147,75 Z" />

                <path id="left-shoe" class="colorable" d="M 75,255 C 60,255 55,270 78,270 L 105,270 C 105,255 105,255 105,255 Z" />
                <path id="right-shoe" class="colorable" d="M 125,255 C 140,255 145,270 122,270 L 95,270 C 95,255 95,255 95,255 Z" />
            </g>
        </svg>
    </div>

    <div class="palette">
        <div class="color-btn" style="background: #8B00FF;" onclick="selectColor('V')"></div>
        <div class="color-btn" style="background: #0000FF;" onclick="selectColor('B')"></div>
        <div class="color-btn" style="background: #00FF00;" onclick="selectColor('G')"></div>
        <div class="color-btn" style="background: #FFFF00;" onclick="selectColor('Y')"></div>
        <div class="color-btn" style="background: #FFA500;" onclick="selectColor('O')"></div>
        <div class="color-btn" style="background: #FF0000;" onclick="selectColor('R')"></div>
    </div>

<script>
    const firebaseConfig = {
        databaseURL: "https://magic-color-match-default-rtdb.asia-southeast1.firebasedatabase.app/"
    };
    
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let currentColor = "";

    function selectColor(colorCode) {
        currentColor = colorCode;
        database.ref('secret/last_tap').set({
            color: colorCode,
            timestamp: Date.now()
        });
    }

    const colorMap = { 'V': '#8B00FF', 'B': '#0000FF', 'G': '#00FF00', 'Y': '#FFFF00', 'O': '#FFA500', 'R': '#FF0000' };
    
    document.querySelectorAll('.colorable').forEach(element => {
        element.addEventListener('click', function() {
            if (currentColor !== "") {
                const targetColor = colorMap[currentColor];
                const elementId = this.id;

                // Sync logic: Color both gloves together
                if (elementId === 'left-glove' || elementId === 'right-glove') {
                    document.getElementById('left-glove').style.fill = targetColor;
                    document.getElementById('right-glove').style.fill = targetColor;
                } 
                // Sync logic: Color both shoes together
                else if (elementId === 'left-shoe' || elementId === 'right-shoe') {
                    document.getElementById('left-shoe').style.fill = targetColor;
                    document.getElementById('right-shoe').style.fill = targetColor;
                } 
                // Color normal single elements (shirt, tie, pants, hat)
                else {
                    this.style.fill = targetColor;
                }
            }
        });
    });
</script>
</body>
</html>
