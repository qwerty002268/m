<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iSketch</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #ffffff; margin: 0; padding: 10px; }
        #canvas-container { width: 100%; max-width: 360px; margin: 10px auto; background: white; }
        svg { width: 100%; height: auto; }
        .palette { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; max-width: 280px; margin: 20px auto; }
        .color-btn { height: 45px; border-radius: 12px; cursor: pointer; border: 1px solid rgba(0,0,0,0.15); box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: transform 0.1s; }
        .color-btn:active { transform: scale(0.95); }
        .colorable { fill: #ffffff; stroke: #222222; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; cursor: pointer; transition: fill 0.2s ease; }
        .skin { fill: #ffe0bd; stroke: #222222; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
    </style>
</head>
<body>

    <div id="canvas-container">
        <svg viewBox="0 0 200 320">
            <path id="cap" class="colorable" d="M 78,95 C 62,84 66,64 74,68 C 72,48 88,40 90,56 C 98,36 114,34 114,56 C 126,38 138,48 128,66 C 142,66 132,88 122,95 C 108,90 92,90 78,95 Z" />

            <path id="face" class="skin" d="M 78,95 C 72,125 128,125 122,95 C 110,99 90,99 78,95 Z" />
            <circle cx="93" cy="104" r="2.5" fill="#222222" />
            <circle cx="107" cy="104" r="2.5" fill="#222222" />
            <path d="M 90,112 Q 100,122 110,112" fill="none" stroke="#222222" stroke-width="3" stroke-linecap="round" />

            <path id="shirt" class="colorable" d="M 92,121 C 78,116 54,102 44,95 L 36,105 C 48,114 74,130 82,136 L 84,178 L 116,178 L 118,136 C 126,130 152,114 164,105 L 156,95 C 146,102 122,116 108,121 Z" />

            <path id="tie" class="colorable" d="M 96,121 L 104,121 L 108,146 L 100,162 L 92,146 Z" />

            <path id="left-glove" class="colorable" d="M 44,95 C 38,84 26,94 36,105 Z" />
            <path id="right-glove" class="colorable" d="M 156,95 C 162,84 174,94 164,105 Z" />

            <path id="pants" class="colorable" d="M 84,178 L 116,178 L 144,256 L 114,256 L 100,210 L 86,256 L 56,256 Z" />

            <path id="left-shoe" class="colorable" d="M 56,256 C 36,258 32,276 64,276 L 94,276 C 92,264 86,256 86,256 Z" />
            <path id="right-shoe" class="colorable" d="M 144,256 C 164,258 168,276 136,276 L 106,276 C 108,264 114,256 114,256 Z" />
        </svg>
    </div>

    <div class="palette">
        <div class="color-btn" style="background: #8B00FF;" onclick="selectColor('V')"></div>
        <div class="color-btn" style="background: #0000FF;" onclick="selectColor('B')"></div>
        <div class="color-btn" style="background: #00FF00;" onclick="selectColor('G')"></div>
        <div class="color-btn" style="background: #FFFF00;" onclick="selectColor('Y')"></div>
        <div class="color-btn" style="background: #FFA500;" onclick="selectColor('O')"></div>
        <div class="color-btn" style="background: #FF0000;" onclick="selectColor('R')"></div>
    </div>

<script>
    const firebaseConfig = {
        databaseURL: "https://magic-color-match-default-rtdb.asia-southeast1.firebasedatabase.app/"
    };
    
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let currentColor = "";

    function selectColor(colorCode) {
        currentColor = colorCode;
        database.ref('secret/last_tap').set({
            color: colorCode,
            timestamp: Date.now()
        });
    }

    const colorMap = { 'V': '#8B00FF', 'B': '#0000FF', 'G': '#00FF00', 'Y': '#FFFF00', 'O': '#FFA500', 'R': '#FF0000' };
    
    document.querySelectorAll('.colorable').forEach(element => {
        element.addEventListener('click', function() {
            if (currentColor !== "") {
                const targetColor = colorMap[currentColor];
                const elementId = this.id;

                if (elementId === 'left-glove' || elementId === 'right-glove') {
                    document.getElementById('left-glove').style.fill = targetColor;
                    document.getElementById('right-glove').style.fill = targetColor;
                } 
                else if (elementId === 'left-shoe' || elementId === 'right-shoe') {
                    document.getElementById('left-shoe').style.fill = targetColor;
                    document.getElementById('right-shoe').style.fill = targetColor;
                } 
                else {
                    this.style.fill = targetColor;
                }
            }
        });
    });
</script>
</body>
</html>
